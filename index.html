<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Medidor de daños</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #111;
      font-family: -apple-system, system-ui, sans-serif;
      color: #fff;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
    }

    #app {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
    }

    #stage {
      position: relative;
      flex: 1;
      overflow: hidden;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /*
      CAMBIO CLAVE respecto a v1:
      Antes el canvas se estiraba con object-fit: cover y recortaba.
      Ahora le digo "ocupa lo que puedas dentro del stage pero
      mantén tus proporciones". El navegador centra y deja bandas
      negras si hace falta. Esto hace que cada píxel CSS del canvas
      visible se corresponda 1:1 con un área del canvas interno,
      y la regla de tres de getCanvasPoint vuelve a ser correcta.
    */
    #video, #canvas {
      max-width: 100%;
      max-height: 100%;
      width: auto;
      height: auto;
      display: block;
    }
    #canvas { display: none; }

    #controls {
      display: flex;
      gap: 8px;
      padding: 12px;
      background: #1a1a1a;
      border-top: 1px solid #333;
    }

    button {
      flex: 1;
      padding: 14px 8px;
      font-size: 14px;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      background: #2a6fdb;
      color: #fff;
      cursor: pointer;
    }
    button.secondary { background: #444; }
    button.danger    { background: #c0392b; }
    button.success   { background: #27ae60; }

    #hint {
      position: absolute;
      top: 12px;
      left: 12px;
      right: 12px;
      padding: 10px 14px;
      background: rgba(0,0,0,0.7);
      border-radius: 8px;
      font-size: 14px;
      text-align: center;
      pointer-events: none;
      z-index: 5;
    }

    #scale-badge {
      position: absolute;
      bottom: 12px;
      left: 12px;
      padding: 6px 12px;
      background: rgba(255,235,59,0.9);
      color: #000;
      border-radius: 16px;
      font-size: 12px;
      font-weight: 700;
      display: none;
      pointer-events: none;
      z-index: 5;
    }

    #modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }
    #modal.show { display: flex; }
    #modal .box {
      background: #222;
      padding: 24px;
      border-radius: 12px;
      width: 90%;
      max-width: 320px;
    }
    #modal h3 { margin-bottom: 12px; }
    #modal p  { font-size: 14px; color: #aaa; }
    #modal input {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      border-radius: 8px;
      border: 1px solid #555;
      background: #111;
      color: #fff;
      margin: 12px 0;
    }
    #modal .buttons { display: flex; gap: 8px; }
  </style>
</head>
<body>

<div id="app">
  <div id="stage">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
    <div id="hint">Apunta la cámara al daño con el flexómetro visible</div>
    <div id="scale-badge"></div>
  </div>

  <div id="controls">
    <button id="btn-shoot">📷 Capturar</button>
    <button id="btn-retake"     class="secondary" style="display:none">↺ Nueva foto</button>
    <button id="btn-redo-cal"   class="secondary" style="display:none">Rehacer puntos</button>
    <button id="btn-confirm-cal" class="success"  style="display:none">✓ Confirmar</button>
    <button id="btn-undo-meas"  class="secondary" style="display:none">Deshacer</button>
    <button id="btn-clear-meas" class="secondary" style="display:none">Borrar todo</button>
    <button id="btn-share"      style="display:none">📤 Compartir</button>
  </div>
</div>

<div id="modal">
  <div class="box">
    <h3>Calibración</h3>
    <p>¿Cuántos milímetros hay entre los dos puntos amarillos?</p>
    <input id="mm-input" type="number" inputmode="decimal" placeholder="Ej: 100" />
    <div class="buttons">
      <button id="modal-cancel" class="secondary">Cancelar</button>
      <button id="modal-ok">Aceptar</button>
    </div>
  </div>
</div>

<script>
/* ============================================================
   ESTADO
   ============================================================
   Fases:
     'camera'        cámara en vivo
     'calibrate'     marcando los dos puntos de referencia
     'calibrate-ok' (NUEVA)  puntos puestos, esperando confirmación
                             para que el usuario vea si están bien
     'measure'       midiendo pares de puntos libremente
   ============================================================ */
const state = {
  phase: 'camera',
  stream: null,
  photo: null,
  calibPoints: [],
  mmPerPixel: null,
  measurements: [],   // [{a, b, mm}, ...]
  pendingPoint: null  // primer punto de una medida en curso
};

const video   = document.getElementById('video');
const canvas  = document.getElementById('canvas');
const ctx     = canvas.getContext('2d');
const hint    = document.getElementById('hint');
const modal   = document.getElementById('modal');
const mmInput = document.getElementById('mm-input');
const badge   = document.getElementById('scale-badge');

const btnShoot      = document.getElementById('btn-shoot');
const btnRetake     = document.getElementById('btn-retake');
const btnRedoCal    = document.getElementById('btn-redo-cal');
const btnConfirmCal = document.getElementById('btn-confirm-cal');
const btnUndoMeas   = document.getElementById('btn-undo-meas');
const btnClearMeas  = document.getElementById('btn-clear-meas');
const btnShare      = document.getElementById('btn-share');


/* ============================================================
   CÁMARA
   ============================================================ */
async function startCamera() {
  try {
    /* Pido alta resolución. Antes no lo pedía y por eso parecía
       "zoom y sin enfocar": en realidad era resolución baja
       (640x480) estirada hasta llenar la pantalla.
       focusMode 'continuous' pide enfoque automático continuo;
       si el móvil no lo soporta, lo ignora sin error. */
    state.stream = await navigator.mediaDevices.getUserMedia({
      video: {
        facingMode: { ideal: 'environment' },
        width:  { ideal: 1920 },
        height: { ideal: 1080 },
        focusMode: 'continuous'
      },
      audio: false
    });
    video.srcObject = state.stream;
  } catch (err) {
    hint.textContent = 'Error con la cámara: ' + err.message;
  }
}

function stopCamera() {
  if (state.stream) {
    state.stream.getTracks().forEach(t => t.stop());
    state.stream = null;
  }
  video.style.display = 'none';
  canvas.style.display = 'block';
}


/* ============================================================
   CAPTURA
   ============================================================ */
function takePhoto() {
  canvas.width  = video.videoWidth;
  canvas.height = video.videoHeight;
  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

  const dataUrl = canvas.toDataURL('image/jpeg', 0.9);
  state.photo = new Image();
  state.photo.onload = () => {
    stopCamera();
    setPhase('calibrate');
  };
  state.photo.src = dataUrl;
}


/* ============================================================
   COORDENADAS
   ============================================================
   Con object-fit ya no recortando, esta función SÍ funciona bien.
   rect = tamaño del canvas tal y como se ve, todo él corresponde
   con el canvas interno → regla de tres correcta.
   ============================================================ */
function getCanvasPoint(evt) {
  const t = evt.touches ? evt.touches[0] : evt;
  const rect = canvas.getBoundingClientRect();
  const cssX = t.clientX - rect.left;
  const cssY = t.clientY - rect.top;
  return {
    x: cssX * (canvas.width  / rect.width),
    y: cssY * (canvas.height / rect.height)
  };
}


/* ============================================================
   DIBUJO
   ============================================================ */
function redraw() {
  if (!state.photo) return;

  ctx.drawImage(state.photo, 0, 0, canvas.width, canvas.height);

  /* Calibración (amarillo) */
  state.calibPoints.forEach(p => drawCross(p.x, p.y, '#ffeb3b'));
  if (state.calibPoints.length === 2) {
    const [a, b] = state.calibPoints;
    drawLine(a, b, '#ffeb3b', 3);
    if (state.mmPerPixel) {
      const mm = Math.hypot(b.x - a.x, b.y - a.y) * state.mmPerPixel;
      drawLabel(a, b, `ref: ${mm.toFixed(1)} mm`, '#ffeb3b');
    }
  }

  /* Mediciones (rojo) con su distancia escrita */
  state.measurements.forEach(m => {
    drawCross(m.a.x, m.a.y, '#e53935');
    drawCross(m.b.x, m.b.y, '#e53935');
    drawLine(m.a, m.b, '#e53935', 3);
    drawLabel(m.a, m.b, `${m.mm.toFixed(1)} mm`, '#e53935');
  });

  /* Punto pendiente de cerrar pareja */
  if (state.pendingPoint) {
    drawCross(state.pendingPoint.x, state.pendingPoint.y, '#e53935');
  }
}

function drawCross(x, y, color) {
  const s = 16;
  ctx.strokeStyle = color;
  ctx.lineWidth = 4;
  ctx.beginPath();
  ctx.moveTo(x - s, y); ctx.lineTo(x + s, y);
  ctx.moveTo(x, y - s); ctx.lineTo(x, y + s);
  ctx.stroke();
}

function drawLine(a, b, color, width) {
  ctx.strokeStyle = color;
  ctx.lineWidth = width;
  ctx.beginPath();
  ctx.moveTo(a.x, a.y);
  ctx.lineTo(b.x, b.y);
  ctx.stroke();
}

/* Etiqueta en el punto medio con fondo para que sea legible
   sobre cualquier color de fondo. */
function drawLabel(a, b, text, color) {
  const midX = (a.x + b.x) / 2;
  const midY = (a.y + b.y) / 2;
  /* Tamaño de fuente proporcional al canvas para que se vea
     bien tanto en una foto pequeña como en una grande. */
  const fontSize = Math.max(22, canvas.width / 50);
  ctx.font = `bold ${fontSize}px sans-serif`;

  const metrics = ctx.measureText(text);
  const padX = 10, padY = 6;
  const w = metrics.width + padX * 2;
  const h = fontSize + padY * 2;

  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(midX - w / 2, midY - h / 2, w, h);

  ctx.strokeStyle = color;
  ctx.lineWidth = 2;
  ctx.strokeRect(midX - w / 2, midY - h / 2, w, h);

  ctx.fillStyle = color;
  ctx.textBaseline = 'middle';
  ctx.textAlign = 'center';
  ctx.fillText(text, midX, midY);

  ctx.textAlign = 'left';
  ctx.textBaseline = 'alphabetic';
}


/* ============================================================
   CALIBRACIÓN CON VERIFICACIÓN
   ============================================================ */
function onCalibrateTap(evt) {
  evt.preventDefault();
  if (state.calibPoints.length >= 2) return;
  state.calibPoints.push(getCanvasPoint(evt));
  redraw();
  /* No abro modal todavía: paso a fase de verificación */
  if (state.calibPoints.length === 2) setPhase('calibrate-ok');
}

function openCalibModal() {
  modal.classList.add('show');
  mmInput.value = '';
  setTimeout(() => mmInput.focus(), 100);
}

function confirmCalibration() {
  const mm = parseFloat(mmInput.value);
  if (!mm || mm <= 0) {
    alert('Introduce un número válido en mm');
    return;
  }
  const [a, b] = state.calibPoints;
  const pixels = Math.hypot(b.x - a.x, b.y - a.y);
  state.mmPerPixel = mm / pixels;
  modal.classList.remove('show');
  setPhase('measure');
}


/* ============================================================
   MEDICIÓN PUNTO A PUNTO (tantas como quieras)
   ============================================================ */
function onMeasureTap(evt) {
  evt.preventDefault();
  const p = getCanvasPoint(evt);

  if (!state.pendingPoint) {
    /* Primer toque de una medida nueva */
    state.pendingPoint = p;
  } else {
    /* Segundo toque: cierro y guardo la medida */
    const a = state.pendingPoint;
    const b = p;
    const pixels = Math.hypot(b.x - a.x, b.y - a.y);
    const mm = pixels * state.mmPerPixel;
    state.measurements.push({ a, b, mm });
    state.pendingPoint = null;
  }
  redraw();
  updateHintMeasure();
}

function updateHintMeasure() {
  if (state.pendingPoint) {
    hint.textContent = 'Toca el segundo punto para cerrar la medida';
  } else {
    const n = state.measurements.length;
    hint.textContent = n === 0
      ? 'Toca dos puntos para medir su distancia'
      : `${n} medida${n > 1 ? 's' : ''}. Toca para añadir otra`;
  }
}


/* ============================================================
   MÁQUINA DE FASES
   ============================================================ */
function setPhase(newPhase) {
  state.phase = newPhase;

  /* Reset de listeners */
  canvas.removeEventListener('touchstart', onCalibrateTap);
  canvas.removeEventListener('mousedown',  onCalibrateTap);
  canvas.removeEventListener('touchstart', onMeasureTap);
  canvas.removeEventListener('mousedown',  onMeasureTap);

  /* Oculto todos los botones */
  [btnShoot, btnRetake, btnRedoCal, btnConfirmCal,
   btnUndoMeas, btnClearMeas, btnShare].forEach(b => b.style.display = 'none');

  /* Píldora con escala visible solo cuando ya calibramos */
  if (state.mmPerPixel) {
    badge.style.display = 'block';
    badge.textContent = `escala: ${state.mmPerPixel.toFixed(3)} mm/px`;
  } else {
    badge.style.display = 'none';
  }

  if (newPhase === 'camera') {
    hint.textContent = 'Apunta la cámara al daño con el flexómetro visible';
    btnShoot.style.display = 'block';
    video.style.display = 'block';
    canvas.style.display = 'none';
    state.calibPoints = [];
    state.measurements = [];
    state.mmPerPixel = null;
    state.pendingPoint = null;
    startCamera();
  }

  else if (newPhase === 'calibrate') {
    hint.textContent = 'Toca dos puntos del flexómetro (marca 1, marca 2)';
    btnRetake.style.display = 'block';
    canvas.addEventListener('touchstart', onCalibrateTap, { passive: false });
    canvas.addEventListener('mousedown',  onCalibrateTap);
    redraw();
  }

  else if (newPhase === 'calibrate-ok') {
    /* Fase nueva: el usuario verifica antes de meter el valor en mm */
    hint.textContent = '¿Los puntos amarillos están bien colocados?';
    btnRedoCal.style.display = 'block';
    btnConfirmCal.style.display = 'block';
    redraw();
  }

  else if (newPhase === 'measure') {
    btnRetake.style.display = 'block';
    btnUndoMeas.style.display = 'block';
    btnClearMeas.style.display = 'block';
    btnShare.style.display = 'block';
    canvas.addEventListener('touchstart', onMeasureTap, { passive: false });
    canvas.addEventListener('mousedown',  onMeasureTap);
    updateHintMeasure();
    redraw();
  }
}


/* ============================================================
   COMPARTIR (Web Share API)
   ============================================================
   Abre el menú nativo del móvil con todas las opciones: WhatsApp,
   email, Drive, guardar en fotos, etc. Más limpio que descargar
   forzosamente. Si el navegador no soporta compartir archivos,
   caemos a descarga clásica.
   ============================================================ */
btnShare.addEventListener('click', () => {
  canvas.toBlob(async (blob) => {
    const filename = `medidas-${Date.now()}.jpg`;
    const file = new File([blob], filename, { type: 'image/jpeg' });

    if (navigator.canShare && navigator.canShare({ files: [file] })) {
      try {
        await navigator.share({
          files: [file],
          title: 'Medidas',
          text: 'Documentación de daño'
        });
      } catch (err) {
        /* Cancelado por el usuario o error. No molesto con avisos. */
      }
    } else {
      const link = document.createElement('a');
      link.download = filename;
      link.href = URL.createObjectURL(blob);
      link.click();
      URL.revokeObjectURL(link.href);
    }
  }, 'image/jpeg', 0.92);
});


/* ============================================================
   RESTO DE BOTONES
   ============================================================ */
btnShoot.addEventListener('click', takePhoto);

btnRetake.addEventListener('click', () => {
  state.photo = null;
  setPhase('camera');
});

btnRedoCal.addEventListener('click', () => {
  state.calibPoints = [];
  setPhase('calibrate');
});

btnConfirmCal.addEventListener('click', openCalibModal);

btnUndoMeas.addEventListener('click', () => {
  if (state.pendingPoint) state.pendingPoint = null;
  else state.measurements.pop();
  redraw();
  updateHintMeasure();
});

btnClearMeas.addEventListener('click', () => {
  state.measurements = [];
  state.pendingPoint = null;
  redraw();
  updateHintMeasure();
});

document.getElementById('modal-ok').addEventListener('click', confirmCalibration);
document.getElementById('modal-cancel').addEventListener('click', () => {
  modal.classList.remove('show');
  setPhase('calibrate-ok');
});


/* ============================================================
   ARRANQUE
   ============================================================ */
setPhase('camera');
</script>
</body>
</html>
