<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Damage Measurement Tool</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #111;
      font-family: -apple-system, system-ui, sans-serif;
      color: #fff;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
    }

    #app { position: fixed; inset: 0; display: flex; flex-direction: column; }

    #stage {
      position: relative;
      flex: 1;
      overflow: hidden;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #canvas {
      max-width: 100%;
      max-height: 100%;
      width: auto;
      height: auto;
      display: block;
    }

    #welcome { text-align: center; padding: 32px; }
    #welcome h1 { font-size: 24px; margin-bottom: 12px; }
    #welcome p  { color: #aaa; margin-bottom: 24px; line-height: 1.5; }
    #welcome .actions { display: flex; flex-direction: column; gap: 12px; align-items: center; }
    #welcome button { padding: 16px 32px; font-size: 16px; width: 220px; }

    #controls {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 12px;
      background: #1a1a1a;
      border-top: 1px solid #333;
    }

    button {
      flex: 1;
      min-width: 80px;
      padding: 14px 8px;
      font-size: 14px;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      background: #2a6fdb;
      color: #fff;
      cursor: pointer;
    }
    button.secondary { background: #444; }
    button.danger    { background: #c0392b; }
    button.success   { background: #27ae60; }
    button.icon      { flex: 0 0 auto; min-width: 0; padding: 14px 12px; }

    #hint {
      position: absolute;
      top: 12px;
      left: 12px;
      right: 12px;
      padding: 10px 14px;
      background: rgba(0,0,0,0.7);
      border-radius: 8px;
      font-size: 14px;
      text-align: center;
      pointer-events: none;
      z-index: 5;
    }

    #scale-badge {
      position: absolute;
      bottom: 12px;
      left: 12px;
      padding: 6px 12px;
      background: rgba(255,235,59,0.9);
      color: #000;
      border-radius: 16px;
      font-size: 12px;
      font-weight: 700;
      display: none;
      pointer-events: none;
      z-index: 5;
    }

    #fab-fit {
      position: absolute;
      bottom: 12px;
      right: 12px;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: rgba(0,0,0,0.6);
      border: 1px solid #555;
      color: #fff;
      font-size: 12px;
      font-weight: 700;
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 5;
      cursor: pointer;
      padding: 0;
      min-width: 0;
      flex: 0 0 auto;
    }
    #fab-fit.show { display: flex; }

    body.clean #hint,
    body.clean #scale-badge,
    body.clean #controls,
    body.clean #fab-fit { display: none !important; }
    body.clean #fab-exit-clean { display: flex !important; }

    #fab-exit-clean {
      position: fixed;
      top: 12px;
      right: 12px;
      display: none;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: rgba(0,0,0,0.6);
      border: 1px solid #555;
      color: #fff;
      font-size: 18px;
      align-items: center;
      justify-content: center;
      z-index: 20;
      cursor: pointer;
      padding: 0;
      min-width: 0;
      flex: 0 0 auto;
    }

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 30;
    }
    .modal.show { display: flex; }
    .modal .box {
      background: #222;
      padding: 24px;
      border-radius: 12px;
      width: 90%;
      max-width: 320px;
    }
    .modal h3 { margin-bottom: 12px; }
    .modal p  { font-size: 14px; color: #aaa; }
    .modal input {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      border-radius: 8px;
      border: 1px solid #555;
      background: #111;
      color: #fff;
      margin: 12px 0;
    }
    .modal .buttons { display: flex; gap: 8px; }

    #panel {
      position: fixed;
      top: 0;
      right: 0;
      bottom: 0;
      width: 85%;
      max-width: 340px;
      background: #1a1a1a;
      border-left: 1px solid #333;
      transform: translateX(100%);
      transition: transform 0.25s ease-out;
      z-index: 25;
      display: flex;
      flex-direction: column;
    }
    #panel.show { transform: translateX(0); }
    #panel header {
      padding: 16px;
      border-bottom: 1px solid #333;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    #panel header h3 { font-size: 16px; }
    #panel-close {
      background: #333;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      font-size: 18px;
      flex: 0 0 auto;
      padding: 0;
      min-width: 0;
    }
    #panel-list { flex: 1; overflow-y: auto; padding: 8px; }
    #panel-empty { padding: 32px 16px; text-align: center; color: #666; font-size: 14px; }
    .item {
      background: #252525;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 8px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .item.hidden { opacity: 0.45; }
    .item .name { font-weight: 600; font-size: 14px; }
    .item .mm   { color: #e53935; font-weight: 700; font-size: 16px; }
    .item .row  { display: flex; justify-content: space-between; align-items: center; }
    .item .actions { display: flex; gap: 6px; }
    .item .actions button {
      flex: 0 0 auto;
      min-width: 0;
      padding: 8px 10px;
      font-size: 13px;
      background: #333;
    }
    .item .actions button.danger { background: #c0392b; }

    #panel-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 24;
      display: none;
    }
    #panel-backdrop.show { display: block; }
  </style>
</head>
<body>

<div id="app">
  <div id="stage">
    <div id="welcome">
      <h1>Damage Measurement Tool</h1>
      <p>Take a new photo or pick one from the gallery</p>
      <div class="actions">
        <button id="btn-pick-camera">📷 Take photo</button>
        <button id="btn-pick-gallery" class="secondary">🖼 From gallery</button>
      </div>
    </div>
    <canvas id="canvas" style="display:none"></canvas>
    <div id="hint" style="display:none">Point the camera at the damage with the ruler visible</div>
    <div id="scale-badge"></div>
    <button id="fab-fit" title="Fit to screen">1:1</button>
  </div>

  <div id="controls" style="display:none">
    <button id="btn-retake-camera"  class="secondary icon" title="New photo (camera)">📷</button>
    <button id="btn-retake-gallery" class="secondary icon" title="New photo (gallery)">🖼</button>
    <button id="btn-confirm-point"  class="success"   style="display:none">✓ Confirm</button>
    <button id="btn-confirm-meas"   class="success"   style="display:none">✓ Close measurement</button>
    <button id="btn-cancel-meas"    class="secondary" style="display:none">Cancel</button>
    <button id="btn-list"           class="secondary" style="display:none">📋 List</button>
    <button id="btn-clean"          class="secondary icon" style="display:none" title="Clean mode">👁</button>
    <button id="btn-save"           style="display:none">💾 Save</button>
    <button id="btn-share"          style="display:none">📤 Share</button>
  </div>
</div>

<button id="fab-exit-clean">✕</button>

<!--
  Two inputs: the key difference is the "capture" attribute.
  With capture="environment" the OS opens the native camera.
  Without it, the user can pick from gallery / files / camera.
-->
<input type="file" id="file-camera"  accept="image/*" capture="environment" style="display:none">
<input type="file" id="file-gallery" accept="image/*" style="display:none">

<div id="modal-calib" class="modal">
  <div class="box">
    <h3>Calibration</h3>
    <p>How many millimeters between the two yellow points?</p>
    <input id="mm-input" type="number" inputmode="decimal" placeholder="e.g. 100" />
    <div class="buttons">
      <button id="calib-cancel" class="secondary">Cancel</button>
      <button id="calib-ok">Accept</button>
    </div>
  </div>
</div>

<div id="modal-rename" class="modal">
  <div class="box">
    <h3>Rename measurement</h3>
    <input id="rename-input" type="text" placeholder="Measurement name" maxlength="30" />
    <div class="buttons">
      <button id="rename-cancel" class="secondary">Cancel</button>
      <button id="rename-ok">Accept</button>
    </div>
  </div>
</div>

<div id="panel-backdrop"></div>
<div id="panel">
  <header>
    <h3>Measurements</h3>
    <button id="panel-close">✕</button>
  </header>
  <div id="panel-list">
    <div id="panel-empty">No measurements yet</div>
  </div>
</div>

<script>
/* ============================================================
   STATE
   ============================================================
   Phases:
     'init'         welcome screen
     'calib-1'      placing first reference point
     'calib-1-set'  point placed, awaiting confirmation
     'calib-2'      placing second reference point
     'calib-2-set'  point placed, awaiting confirmation
     'measure-idle' no measurement in progress
     'measure-1'    first point placed, awaiting confirmation
     'measure-2-empty'  awaiting second point tap
     'measure-2'    second point placed, awaiting close

   Why so many phases now: every point gets confirmation.
   "placing" = no point yet for this step.
   "set"     = point on screen, waiting for the user to confirm
               (or tap again to reposition).
   ============================================================ */
const state = {
  phase: 'init',
  photo: null,

  /* Zoom and pan. Transform:
       visibleX = imgX * scale + offsetX
       imgX     = (visibleX - offsetX) / scale  */
  scale: 1,
  offsetX: 0,
  offsetY: 0,

  /* Gesture tracking */
  pinchStartDist: 0,
  pinchStartScale: 1,
  pinchCenter: null,
  panStart: null,
  isPinching: false,
  isPanning: false,
  touchStartTime: 0,
  touchStartPos: null,
  mouseDown: false,    // for desktop pan tracking

  /* Measurement data */
  calibPoints: [],
  mmPerPixel: null,
  measurements: [],
  pendingA: null,
  pendingB: null,
  measureCounter: 0,
  renamingId: null
};

const welcome = document.getElementById('welcome');
const canvas  = document.getElementById('canvas');
const ctx     = canvas.getContext('2d');
const hint    = document.getElementById('hint');
const controls= document.getElementById('controls');
const badge   = document.getElementById('scale-badge');
const fabFit  = document.getElementById('fab-fit');

const fileCamera  = document.getElementById('file-camera');
const fileGallery = document.getElementById('file-gallery');

const btnPickCamera    = document.getElementById('btn-pick-camera');
const btnPickGallery   = document.getElementById('btn-pick-gallery');
const btnRetakeCamera  = document.getElementById('btn-retake-camera');
const btnRetakeGallery = document.getElementById('btn-retake-gallery');
const btnConfirmPoint  = document.getElementById('btn-confirm-point');
const btnConfirmMeas   = document.getElementById('btn-confirm-meas');
const btnCancelMeas    = document.getElementById('btn-cancel-meas');
const btnList          = document.getElementById('btn-list');
const btnClean         = document.getElementById('btn-clean');
const btnSave          = document.getElementById('btn-save');
const btnShare         = document.getElementById('btn-share');
const fabExitClean     = document.getElementById('fab-exit-clean');

const modalCalib   = document.getElementById('modal-calib');
const modalRename  = document.getElementById('modal-rename');
const mmInput      = document.getElementById('mm-input');
const renameInput  = document.getElementById('rename-input');

const panel         = document.getElementById('panel');
const panelBackdrop = document.getElementById('panel-backdrop');
const panelList     = document.getElementById('panel-list');
const panelClose    = document.getElementById('panel-close');


/* ============================================================
   PHOTO LOADING
   ============================================================ */
btnPickCamera.addEventListener('click',    () => fileCamera.click());
btnPickGallery.addEventListener('click',   () => fileGallery.click());
btnRetakeCamera.addEventListener('click',  () => fileCamera.click());
btnRetakeGallery.addEventListener('click', () => fileGallery.click());

[fileCamera, fileGallery].forEach(input => {
  input.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    loadPhotoFromFile(file);
    input.value = '';
  });
});

function loadPhotoFromFile(file) {
  const reader = new FileReader();
  reader.onload = (e) => {
    const img = new Image();
    img.onload = () => {
      state.photo = img;
      canvas.width  = img.naturalWidth;
      canvas.height = img.naturalHeight;
      state.calibPoints = [];
      state.measurements = [];
      state.mmPerPixel = null;
      state.pendingA = null;
      state.pendingB = null;
      state.measureCounter = 0;
      resetZoom();
      setPhase('calib-1');
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}


/* ============================================================
   ZOOM AND PAN
   ============================================================ */
function resetZoom() {
  state.scale = 1;
  state.offsetX = 0;
  state.offsetY = 0;
  updateFabFit();
}

function updateFabFit() {
  fabFit.classList.toggle('show',
    state.scale > 1.01 || state.offsetX !== 0 || state.offsetY !== 0);
}

/* Zoom around a canvas point: that point stays visually fixed
   while everything else scales around it (like Google Maps). */
function zoomAt(cx, cy, newScale) {
  newScale = Math.max(1, Math.min(8, newScale));
  const imgX = (cx - state.offsetX) / state.scale;
  const imgY = (cy - state.offsetY) / state.scale;
  state.scale = newScale;
  state.offsetX = cx - imgX * state.scale;
  state.offsetY = cy - imgY * state.scale;
  clampOffset();
  updateFabFit();
}

function clampOffset() {
  if (!state.photo) return;
  const maxOffX = 0;
  const minOffX = canvas.width  - canvas.width  * state.scale;
  const maxOffY = 0;
  const minOffY = canvas.height - canvas.height * state.scale;
  state.offsetX = Math.min(maxOffX, Math.max(minOffX, state.offsetX));
  state.offsetY = Math.min(maxOffY, Math.max(minOffY, state.offsetY));
}


/* ============================================================
   COORDINATE HELPERS
   ============================================================ */
function getCanvasCoord(clientX, clientY) {
  const rect = canvas.getBoundingClientRect();
  return {
    x: (clientX - rect.left) * (canvas.width  / rect.width),
    y: (clientY - rect.top)  * (canvas.height / rect.height)
  };
}

function getImagePoint(clientX, clientY) {
  const c = getCanvasCoord(clientX, clientY);
  return {
    x: (c.x - state.offsetX) / state.scale,
    y: (c.y - state.offsetY) / state.scale
  };
}


/* ============================================================
   DRAWING
   ============================================================
   Cross size is now proportional to image dimensions so it
   looks right on any photo resolution. We also divide by scale
   so the visual size stays constant regardless of zoom.
   ============================================================ */

/* Base size in image pixels, before zoom compensation.
   For a 4000px wide image: 4000 * 0.012 = 48 px cross.
   For a 1000px wide image: 1000 * 0.012 = 20 px (minimum). */
function baseCrossSize() {
  return Math.max(20, canvas.width * 0.012);
}
function baseStroke() {
  return Math.max(5, canvas.width * 0.003);
}
function baseFontSize() {
  return Math.max(28, canvas.width * 0.022);
}

function redraw() {
  if (!state.photo) return;

  /* Reset transform: without this, transforms accumulate on
     each redraw and the image would grow without bound. */
  ctx.setTransform(1, 0, 0, 1, 0, 0);
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.setTransform(state.scale, 0, 0, state.scale,
                   state.offsetX, state.offsetY);
  ctx.drawImage(state.photo, 0, 0);

  /* Divide visual sizes by scale to keep them constant in screen px */
  const k = 1 / state.scale;
  const crossSize = baseCrossSize() * k;
  const stroke    = baseStroke() * k;
  const fontSize  = baseFontSize() * k;

  state.calibPoints.forEach(p => drawCross(p.x, p.y, '#ffeb3b', crossSize, stroke));

  if (state.calibPoints.length === 2) {
    const [a, b] = state.calibPoints;
    drawLine(a, b, '#ffeb3b', stroke);
    if (state.mmPerPixel) {
      const mm = Math.hypot(b.x - a.x, b.y - a.y) * state.mmPerPixel;
      drawLabel(a, b, `ref: ${mm.toFixed(1)} mm`, '#ffeb3b', fontSize, k);
    }
  }

  state.measurements.forEach(m => {
    if (m.hidden) return;
    drawCross(m.a.x, m.a.y, '#e53935', crossSize, stroke);
    drawCross(m.b.x, m.b.y, '#e53935', crossSize, stroke);
    drawLine(m.a, m.b, '#e53935', stroke);
    drawLabel(m.a, m.b, `${m.name}: ${m.mm.toFixed(1)} mm`, '#e53935', fontSize, k);
  });

  if (state.pendingA) drawCross(state.pendingA.x, state.pendingA.y, '#e53935', crossSize, stroke);
  if (state.pendingB) {
    drawCross(state.pendingB.x, state.pendingB.y, '#e53935', crossSize, stroke);
    drawLine(state.pendingA, state.pendingB, '#e53935', stroke);
  }
}

function drawCross(x, y, color, size, stroke) {
  ctx.strokeStyle = color;
  ctx.lineWidth = stroke;
  ctx.beginPath();
  ctx.moveTo(x - size, y); ctx.lineTo(x + size, y);
  ctx.moveTo(x, y - size); ctx.lineTo(x, y + size);
  ctx.stroke();
}

function drawLine(a, b, color, width) {
  ctx.strokeStyle = color;
  ctx.lineWidth = width;
  ctx.beginPath();
  ctx.moveTo(a.x, a.y);
  ctx.lineTo(b.x, b.y);
  ctx.stroke();
}

function drawLabel(a, b, text, color, fontSize, k) {
  const midX = (a.x + b.x) / 2;
  const midY = (a.y + b.y) / 2;
  ctx.font = `bold ${fontSize}px sans-serif`;

  const metrics = ctx.measureText(text);
  const padX = 10 * k, padY = 6 * k;
  const w = metrics.width + padX * 2;
  const h = fontSize + padY * 2;

  ctx.fillStyle = 'rgba(0,0,0,0.75)';
  ctx.fillRect(midX - w / 2, midY - h / 2, w, h);

  ctx.strokeStyle = color;
  ctx.lineWidth = 2 * k;
  ctx.strokeRect(midX - w / 2, midY - h / 2, w, h);

  ctx.fillStyle = color;
  ctx.textBaseline = 'middle';
  ctx.textAlign = 'center';
  ctx.fillText(text, midX, midY);
  ctx.textAlign = 'left';
  ctx.textBaseline = 'alphabetic';
}


/* ============================================================
   TOUCH INPUT (mobile)
   ============================================================ */
const TAP_THRESHOLD_PX = 10;
const TAP_MAX_MS = 500;

function onTouchStart(evt) {
  evt.preventDefault();
  if (evt.touches.length === 2) {
    state.isPinching = true;
    state.isPanning = false;
    const t1 = evt.touches[0], t2 = evt.touches[1];
    state.pinchStartDist = Math.hypot(t2.clientX - t1.clientX, t2.clientY - t1.clientY);
    state.pinchStartScale = state.scale;
    state.pinchCenter = getCanvasCoord((t1.clientX + t2.clientX) / 2,
                                       (t1.clientY + t2.clientY) / 2);
  }
  else if (evt.touches.length === 1) {
    state.isPinching = false;
    state.isPanning = false;
    const t = evt.touches[0];
    state.touchStartTime = Date.now();
    state.touchStartPos = { x: t.clientX, y: t.clientY };
    state.panStart = {
      x: t.clientX, y: t.clientY,
      offsetX: state.offsetX, offsetY: state.offsetY
    };
  }
}

function onTouchMove(evt) {
  evt.preventDefault();
  if (evt.touches.length === 2 && state.isPinching) {
    const t1 = evt.touches[0], t2 = evt.touches[1];
    const dist = Math.hypot(t2.clientX - t1.clientX, t2.clientY - t1.clientY);
    const ratio = dist / state.pinchStartDist;
    zoomAt(state.pinchCenter.x, state.pinchCenter.y, state.pinchStartScale * ratio);
    redraw();
  }
  else if (evt.touches.length === 1 && !state.isPinching) {
    const t = evt.touches[0];
    const dx = t.clientX - state.touchStartPos.x;
    const dy = t.clientY - state.touchStartPos.y;
    if (Math.hypot(dx, dy) > TAP_THRESHOLD_PX && state.scale > 1.01) {
      state.isPanning = true;
      const rect = canvas.getBoundingClientRect();
      state.offsetX = state.panStart.offsetX + dx * (canvas.width  / rect.width);
      state.offsetY = state.panStart.offsetY + dy * (canvas.height / rect.height);
      clampOffset();
      redraw();
    }
  }
}

function onTouchEnd(evt) {
  if (state.isPinching && evt.touches.length < 2) {
    state.isPinching = false;
    if (evt.touches.length === 1) {
      const t = evt.touches[0];
      state.touchStartTime = Date.now();
      state.touchStartPos = { x: t.clientX, y: t.clientY };
      state.panStart = {
        x: t.clientX, y: t.clientY,
        offsetX: state.offsetX, offsetY: state.offsetY
      };
    }
    return;
  }

  if (evt.touches.length === 0 && !state.isPanning && !state.isPinching) {
    const dt = Date.now() - state.touchStartTime;
    if (dt > TAP_MAX_MS) return;
    const t = evt.changedTouches[0];
    handleTap(getImagePoint(t.clientX, t.clientY));
  }

  state.isPanning = false;
}


/* ============================================================
   MOUSE INPUT (desktop)
   ============================================================
   Three behaviors:
   - click (down + up without movement) → tap to place point
   - drag (down + move + up) when zoomed → pan
   - wheel → zoom around cursor
   ============================================================ */
function onMouseDown(evt) {
  evt.preventDefault();
  state.mouseDown = true;
  state.isPanning = false;
  state.touchStartTime = Date.now();
  state.touchStartPos = { x: evt.clientX, y: evt.clientY };
  state.panStart = {
    x: evt.clientX, y: evt.clientY,
    offsetX: state.offsetX, offsetY: state.offsetY
  };
}

function onMouseMove(evt) {
  if (!state.mouseDown) return;
  const dx = evt.clientX - state.touchStartPos.x;
  const dy = evt.clientY - state.touchStartPos.y;
  if (Math.hypot(dx, dy) > TAP_THRESHOLD_PX && state.scale > 1.01) {
    state.isPanning = true;
    const rect = canvas.getBoundingClientRect();
    state.offsetX = state.panStart.offsetX + dx * (canvas.width  / rect.width);
    state.offsetY = state.panStart.offsetY + dy * (canvas.height / rect.height);
    clampOffset();
    redraw();
  }
}

function onMouseUp(evt) {
  if (!state.mouseDown) return;
  state.mouseDown = false;
  if (state.isPanning) {
    state.isPanning = false;
    return;
  }
  const dx = evt.clientX - state.touchStartPos.x;
  const dy = evt.clientY - state.touchStartPos.y;
  if (Math.hypot(dx, dy) > TAP_THRESHOLD_PX) return;
  handleTap(getImagePoint(evt.clientX, evt.clientY));
}

/* Wheel zoom: each notch multiplies scale by ~1.1.
   deltaY < 0 = wheel up = zoom in. */
function onWheel(evt) {
  evt.preventDefault();
  const c = getCanvasCoord(evt.clientX, evt.clientY);
  const factor = evt.deltaY < 0 ? 1.15 : 1 / 1.15;
  zoomAt(c.x, c.y, state.scale * factor);
  redraw();
}


/* ============================================================
   TAP HANDLER
   ============================================================
   A tap either places a NEW point (moving to a "-set" phase
   that requires confirmation) or REPOSITIONS the current point
   if we're already in a "-set" phase.
   ============================================================ */
function handleTap(imgPoint) {
  if (state.phase === 'calib-1') {
    state.calibPoints[0] = imgPoint;
    setPhase('calib-1-set');
  }
  else if (state.phase === 'calib-1-set') {
    state.calibPoints[0] = imgPoint;
    redraw();
  }
  else if (state.phase === 'calib-2') {
    state.calibPoints[1] = imgPoint;
    setPhase('calib-2-set');
  }
  else if (state.phase === 'calib-2-set') {
    state.calibPoints[1] = imgPoint;
    redraw();
  }
  else if (state.phase === 'measure-idle') {
    state.pendingA = imgPoint;
    setPhase('measure-1');
  }
  else if (state.phase === 'measure-1') {
    state.pendingA = imgPoint;
    redraw();
  }
  else if (state.phase === 'measure-2-empty') {
    state.pendingB = imgPoint;
    setPhase('measure-2');
  }
  else if (state.phase === 'measure-2') {
    state.pendingB = imgPoint;
    redraw();
  }
}


/* ============================================================
   ZOOM RESET + CLEAN MODE
   ============================================================ */
fabFit.addEventListener('click', () => { resetZoom(); redraw(); });
btnClean.addEventListener('click', () => document.body.classList.add('clean'));
fabExitClean.addEventListener('click', () => document.body.classList.remove('clean'));


/* ============================================================
   CALIBRATION
   ============================================================ */
function openCalibModal() {
  modalCalib.classList.add('show');
  mmInput.value = '';
  setTimeout(() => mmInput.focus(), 100);
}

function confirmCalibration() {
  const mm = parseFloat(mmInput.value);
  if (!mm || mm <= 0) { alert('Enter a valid number in mm'); return; }
  const [a, b] = state.calibPoints;
  const pixels = Math.hypot(b.x - a.x, b.y - a.y);
  state.mmPerPixel = mm / pixels;
  modalCalib.classList.remove('show');
  setPhase('measure-idle');
}


/* ============================================================
   MEASUREMENTS PANEL
   ============================================================ */
function openPanel() { renderPanelList(); panel.classList.add('show'); panelBackdrop.classList.add('show'); }
function closePanel() { panel.classList.remove('show'); panelBackdrop.classList.remove('show'); }

function renderPanelList() {
  panelList.innerHTML = '';
  if (state.measurements.length === 0) {
    const empty = document.createElement('div');
    empty.id = 'panel-empty';
    empty.textContent = 'No measurements yet';
    panelList.appendChild(empty);
    return;
  }
  state.measurements.forEach(m => {
    const item = document.createElement('div');
    item.className = 'item' + (m.hidden ? ' hidden' : '');
    item.innerHTML = `
      <div class="row">
        <span class="name">${escapeHtml(m.name)}</span>
        <span class="mm">${m.mm.toFixed(1)} mm</span>
      </div>
      <div class="actions">
        <button data-act="rename" data-id="${m.id}">✏️ Rename</button>
        <button data-act="toggle" data-id="${m.id}">${m.hidden ? '👁 Show' : '🚫 Hide'}</button>
        <button data-act="delete" data-id="${m.id}" class="danger">🗑</button>
      </div>
    `;
    panelList.appendChild(item);
  });
}

function escapeHtml(s) {
  return s.replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[c]));
}

panelList.addEventListener('click', (e) => {
  const btn = e.target.closest('button[data-act]');
  if (!btn) return;
  const id  = parseFloat(btn.dataset.id);
  const act = btn.dataset.act;
  const m   = state.measurements.find(x => x.id === id);
  if (!m) return;

  if (act === 'toggle') {
    m.hidden = !m.hidden;
    renderPanelList();
    redraw();
    updateHint();
  }
  else if (act === 'delete') {
    if (confirm(`Delete "${m.name}"?`)) {
      state.measurements = state.measurements.filter(x => x.id !== id);
      renderPanelList();
      redraw();
      updateHint();
    }
  }
  else if (act === 'rename') {
    state.renamingId = id;
    renameInput.value = m.name;
    modalRename.classList.add('show');
    setTimeout(() => { renameInput.focus(); renameInput.select(); }, 100);
  }
});

panelClose.addEventListener('click', closePanel);
panelBackdrop.addEventListener('click', closePanel);


/* ============================================================
   SAVE / SHARE
   ============================================================ */
function exportImage(callback) {
  const savedScale = state.scale;
  const savedOffX  = state.offsetX;
  const savedOffY  = state.offsetY;
  resetZoom();
  redraw();
  callback();
  state.scale = savedScale;
  state.offsetX = savedOffX;
  state.offsetY = savedOffY;
  updateFabFit();
  redraw();
}

btnSave.addEventListener('click', () => {
  exportImage(() => {
    const link = document.createElement('a');
    link.download = `measurements-${Date.now()}.jpg`;
    link.href = canvas.toDataURL('image/jpeg', 0.92);
    link.click();
  });
});

btnShare.addEventListener('click', () => {
  exportImage(() => {
    canvas.toBlob(async (blob) => {
      const filename = `measurements-${Date.now()}.jpg`;
      const file = new File([blob], filename, { type: 'image/jpeg' });
      if (navigator.canShare && navigator.canShare({ files: [file] })) {
        try {
          await navigator.share({ files: [file], title: 'Measurements', text: 'Damage documentation' });
        } catch (err) { /* cancelled */ }
      } else {
        const link = document.createElement('a');
        link.download = filename;
        link.href = URL.createObjectURL(blob);
        link.click();
        URL.revokeObjectURL(link.href);
      }
    }, 'image/jpeg', 0.92);
  });
});


/* ============================================================
   PHASE MACHINE
   ============================================================ */
function setPhase(newPhase) {
  state.phase = newPhase;

  canvas.removeEventListener('touchstart', onTouchStart);
  canvas.removeEventListener('touchmove',  onTouchMove);
  canvas.removeEventListener('touchend',   onTouchEnd);
  canvas.removeEventListener('mousedown',  onMouseDown);
  canvas.removeEventListener('mousemove',  onMouseMove);
  canvas.removeEventListener('mouseup',    onMouseUp);
  canvas.removeEventListener('wheel',      onWheel);

  if (newPhase !== 'init') {
    canvas.addEventListener('touchstart', onTouchStart, { passive: false });
    canvas.addEventListener('touchmove',  onTouchMove,  { passive: false });
    canvas.addEventListener('touchend',   onTouchEnd,   { passive: false });
    canvas.addEventListener('mousedown',  onMouseDown);
    canvas.addEventListener('mousemove',  onMouseMove);
    canvas.addEventListener('mouseup',    onMouseUp);
    canvas.addEventListener('wheel',      onWheel, { passive: false });
  }

  welcome.style.display = (newPhase === 'init') ? 'block' : 'none';
  canvas.style.display  = (newPhase === 'init') ? 'none'  : 'block';
  hint.style.display    = (newPhase === 'init') ? 'none'  : 'block';
  controls.style.display= (newPhase === 'init') ? 'none'  : 'flex';

  if (state.mmPerPixel) {
    badge.style.display = 'block';
    badge.textContent = `scale: ${state.mmPerPixel.toFixed(3)} mm/px`;
  } else {
    badge.style.display = 'none';
  }

  updateButtons();
  updateHint();
  if (newPhase !== 'init') redraw();
}

function updateButtons() {
  [btnRetakeCamera, btnRetakeGallery, btnConfirmPoint, btnConfirmMeas,
   btnCancelMeas, btnList, btnClean, btnSave, btnShare]
    .forEach(b => b.style.display = 'none');

  if (state.phase === 'init') return;

  btnRetakeCamera.style.display = 'block';
  btnRetakeGallery.style.display = 'block';

  /* Confirm button only appears in "-set" phases:
     point has been placed, waiting for user OK. */
  if (state.phase === 'calib-1-set' || state.phase === 'calib-2-set') {
    btnConfirmPoint.style.display = 'block';
  }
  else if (state.phase === 'measure-idle') {
    btnList.style.display = 'block';
    btnClean.style.display = 'block';
    btnSave.style.display = 'block';
    btnShare.style.display = 'block';
  }
  else if (state.phase === 'measure-1') {
    btnConfirmPoint.style.display = 'block';
    btnCancelMeas.style.display = 'block';
  }
  else if (state.phase === 'measure-2-empty') {
    btnCancelMeas.style.display = 'block';
  }
  else if (state.phase === 'measure-2') {
    btnConfirmMeas.style.display = 'block';
    btnCancelMeas.style.display = 'block';
  }
}

function updateHint() {
  if (state.phase === 'calib-1') {
    hint.textContent = 'Tap the first point on the ruler. Pinch to zoom.';
  } else if (state.phase === 'calib-1-set') {
    hint.textContent = 'Tap to reposition, or confirm if the point is correct.';
  } else if (state.phase === 'calib-2') {
    hint.textContent = 'Tap the second point on the ruler.';
  } else if (state.phase === 'calib-2-set') {
    hint.textContent = 'Tap to reposition, or confirm to set the scale.';
  } else if (state.phase === 'measure-idle') {
    const visible = state.measurements.filter(m => !m.hidden).length;
    const total = state.measurements.length;
    if (total === 0) hint.textContent = 'Tap two points to measure. Pinch to zoom.';
    else if (visible === total) hint.textContent = `${total} measurement${total > 1 ? 's' : ''}. Tap to add another.`;
    else hint.textContent = `${visible}/${total} visible. Tap to add another.`;
  } else if (state.phase === 'measure-1') {
    hint.textContent = 'Tap to reposition the first point, or confirm.';
  } else if (state.phase === 'measure-2-empty') {
    hint.textContent = 'Tap the second point.';
  } else if (state.phase === 'measure-2') {
    hint.textContent = 'Tap to reposition the second point, or close the measurement.';
  }
}


/* ============================================================
   POINT CONFIRMATION
   ============================================================ */
btnConfirmPoint.addEventListener('click', () => {
  if (state.phase === 'calib-1-set') {
    setPhase('calib-2');
  }
  else if (state.phase === 'calib-2-set') {
    openCalibModal();
  }
  else if (state.phase === 'measure-1') {
    setPhase('measure-2-empty');
  }
});

btnConfirmMeas.addEventListener('click', () => {
  if (!state.pendingA || !state.pendingB) return;
  const a = state.pendingA;
  const b = state.pendingB;
  const pixels = Math.hypot(b.x - a.x, b.y - a.y);
  const mm = pixels * state.mmPerPixel;
  state.measureCounter++;
  state.measurements.push({
    id: Date.now() + Math.random(),
    name: `Measurement ${state.measureCounter}`,
    a, b, mm,
    hidden: false
  });
  state.pendingA = null;
  state.pendingB = null;
  renderPanelList();
  setPhase('measure-idle');
});

btnCancelMeas.addEventListener('click', () => {
  state.pendingA = null;
  state.pendingB = null;
  setPhase('measure-idle');
});


/* ============================================================
   MODALS
   ============================================================ */
document.getElementById('calib-ok').addEventListener('click', confirmCalibration);
document.getElementById('calib-cancel').addEventListener('click', () => {
  modalCalib.classList.remove('show');
});

document.getElementById('rename-ok').addEventListener('click', () => {
  const newName = renameInput.value.trim();
  if (!newName) { alert('Name cannot be empty'); return; }
  const m = state.measurements.find(x => x.id === state.renamingId);
  if (m) m.name = newName;
  modalRename.classList.remove('show');
  state.renamingId = null;
  renderPanelList();
  redraw();
});
document.getElementById('rename-cancel').addEventListener('click', () => {
  modalRename.classList.remove('show');
  state.renamingId = null;
});

renameInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') document.getElementById('rename-ok').click();
});
mmInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') document.getElementById('calib-ok').click();
});


/* ============================================================
   LIST BUTTON
   ============================================================ */
btnList.addEventListener('click', openPanel);


/* ============================================================
   STARTUP
   ============================================================ */
setPhase('init');
</script>
</body>
</html>
