<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Medidor de daños</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #111;
      font-family: -apple-system, system-ui, sans-serif;
      color: #fff;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
    }

    #app {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
    }

    #stage {
      position: relative;
      flex: 1;
      overflow: hidden;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Canvas centrado, manteniendo proporciones sin recortar.
       Esto es lo que garantiza que las coordenadas funcionen bien. */
    #canvas {
      max-width: 100%;
      max-height: 100%;
      width: auto;
      height: auto;
      display: block;
    }

    /* Pantalla inicial cuando no hay foto todavía */
    #welcome {
      text-align: center;
      padding: 32px;
    }
    #welcome h1 { font-size: 24px; margin-bottom: 12px; }
    #welcome p  { color: #aaa; margin-bottom: 24px; line-height: 1.5; }
    #welcome button {
      padding: 16px 32px;
      font-size: 16px;
    }

    #controls {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 12px;
      background: #1a1a1a;
      border-top: 1px solid #333;
    }

    button {
      flex: 1;
      min-width: 80px;
      padding: 14px 8px;
      font-size: 14px;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      background: #2a6fdb;
      color: #fff;
      cursor: pointer;
    }
    button.secondary { background: #444; }
    button.danger    { background: #c0392b; }
    button.success   { background: #27ae60; }
    button.icon      { flex: 0 0 auto; min-width: 0; padding: 14px 12px; }

    #hint {
      position: absolute;
      top: 12px;
      left: 12px;
      right: 12px;
      padding: 10px 14px;
      background: rgba(0,0,0,0.7);
      border-radius: 8px;
      font-size: 14px;
      text-align: center;
      pointer-events: none;
      z-index: 5;
    }

    #scale-badge {
      position: absolute;
      bottom: 12px;
      left: 12px;
      padding: 6px 12px;
      background: rgba(255,235,59,0.9);
      color: #000;
      border-radius: 16px;
      font-size: 12px;
      font-weight: 700;
      display: none;
      pointer-events: none;
      z-index: 5;
    }

    /* Modo limpio: oculta todo lo que no es la imagen.
       Aplicar la clase al body lo activa. */
    body.clean #hint,
    body.clean #scale-badge,
    body.clean #controls,
    body.clean #fab-clean {
      display: none !important;
    }
    /* En modo limpio, mostramos un botón flotante para salir */
    body.clean #fab-exit-clean { display: flex !important; }

    /* Botón flotante para salir de modo limpio */
    #fab-exit-clean {
      position: fixed;
      top: 12px;
      right: 12px;
      display: none;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: rgba(0,0,0,0.6);
      border: 1px solid #555;
      color: #fff;
      font-size: 18px;
      align-items: center;
      justify-content: center;
      z-index: 20;
      cursor: pointer;
      padding: 0;
      min-width: 0;
      flex: 0 0 auto;
    }

    /* Modal genérico (calibración y renombrar) */
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 30;
    }
    .modal.show { display: flex; }
    .modal .box {
      background: #222;
      padding: 24px;
      border-radius: 12px;
      width: 90%;
      max-width: 320px;
    }
    .modal h3 { margin-bottom: 12px; }
    .modal p  { font-size: 14px; color: #aaa; }
    .modal input {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      border-radius: 8px;
      border: 1px solid #555;
      background: #111;
      color: #fff;
      margin: 12px 0;
    }
    .modal .buttons { display: flex; gap: 8px; }

    /* Panel lateral de la lista de medidas */
    #panel {
      position: fixed;
      top: 0;
      right: 0;
      bottom: 0;
      width: 85%;
      max-width: 340px;
      background: #1a1a1a;
      border-left: 1px solid #333;
      transform: translateX(100%);   /* fuera de pantalla por defecto */
      transition: transform 0.25s ease-out;
      z-index: 25;
      display: flex;
      flex-direction: column;
    }
    #panel.show { transform: translateX(0); }
    #panel header {
      padding: 16px;
      border-bottom: 1px solid #333;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    #panel header h3 { font-size: 16px; }
    #panel-close {
      background: #333;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      font-size: 18px;
      flex: 0 0 auto;
      padding: 0;
      min-width: 0;
    }
    #panel-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }
    #panel-empty {
      padding: 32px 16px;
      text-align: center;
      color: #666;
      font-size: 14px;
    }
    .item {
      background: #252525;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 8px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .item.hidden { opacity: 0.45; }
    .item .name { font-weight: 600; font-size: 14px; }
    .item .mm   { color: #e53935; font-weight: 700; font-size: 16px; }
    .item .row  { display: flex; justify-content: space-between; align-items: center; }
    .item .actions { display: flex; gap: 6px; }
    .item .actions button {
      flex: 0 0 auto;
      min-width: 0;
      padding: 8px 10px;
      font-size: 13px;
      background: #333;
    }
    .item .actions button.danger { background: #c0392b; }

    /* Backdrop semitransparente que aparece detrás del panel */
    #panel-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 24;
      display: none;
    }
    #panel-backdrop.show { display: block; }
  </style>
</head>
<body>

<div id="app">
  <div id="stage">
    <!-- Pantalla de bienvenida: se muestra cuando aún no hay foto -->
    <div id="welcome">
      <h1>Medidor de daños</h1>
      <p>Toma una foto con el flexómetro visible para empezar</p>
      <button id="btn-pick-photo">📷 Tomar foto</button>
    </div>
    <canvas id="canvas" style="display:none"></canvas>
    <div id="hint" style="display:none">Apunta la cámara al daño con el flexómetro visible</div>
    <div id="scale-badge"></div>
  </div>

  <div id="controls" style="display:none">
    <!-- Botones de cada fase. Se muestran/ocultan desde JS. -->
    <button id="btn-retake"      class="secondary">↺ Nueva foto</button>
    <button id="btn-redo-point"  class="secondary" style="display:none">Rehacer punto</button>
    <button id="btn-next-point"  class="success"   style="display:none">Siguiente</button>
    <button id="btn-confirm-cal" class="success"   style="display:none">✓ Confirmar</button>
    <button id="btn-list"        class="secondary" style="display:none">📋 Lista</button>
    <button id="btn-clean"       class="secondary icon" style="display:none" title="Modo limpio">👁</button>
    <button id="btn-save"        style="display:none">💾 Guardar</button>
    <button id="btn-share"       style="display:none">📤 Compartir</button>
  </div>
</div>

<!-- Botón flotante para salir del modo limpio -->
<button id="fab-exit-clean">✕</button>

<!--
  Input de archivo invisible. Es el truco de la cámara nativa:
  - accept="image/*" filtra a imágenes
  - capture="environment" sugiere al móvil que abra la cámara
    trasera directamente, en lugar del selector de galería.
    En PC, se ignora y abre el selector de archivos normal.
-->
<input type="file" id="file-input" accept="image/*" capture="environment" style="display:none">

<!-- Modal de calibración -->
<div id="modal-calib" class="modal">
  <div class="box">
    <h3>Calibración</h3>
    <p>¿Cuántos milímetros hay entre los dos puntos amarillos?</p>
    <input id="mm-input" type="number" inputmode="decimal" placeholder="Ej: 100" />
    <div class="buttons">
      <button id="calib-cancel" class="secondary">Cancelar</button>
      <button id="calib-ok">Aceptar</button>
    </div>
  </div>
</div>

<!-- Modal de renombrar medida -->
<div id="modal-rename" class="modal">
  <div class="box">
    <h3>Renombrar medida</h3>
    <input id="rename-input" type="text" placeholder="Nombre de la medida" maxlength="30" />
    <div class="buttons">
      <button id="rename-cancel" class="secondary">Cancelar</button>
      <button id="rename-ok">Aceptar</button>
    </div>
  </div>
</div>

<!-- Panel lateral de medidas -->
<div id="panel-backdrop"></div>
<div id="panel">
  <header>
    <h3>Medidas</h3>
    <button id="panel-close">✕</button>
  </header>
  <div id="panel-list">
    <div id="panel-empty">No hay medidas todavía</div>
  </div>
</div>

<script>
/* ============================================================
   ESTADO
   ============================================================
   Fases del flujo:
     'init'        sin foto, mostrando pantalla de bienvenida
     'calib-1'     marcando el primer punto del flexómetro
     'calib-1-ok'  primer punto colocado, confirmando
     'calib-2'     marcando el segundo punto
     'calib-2-ok'  ambos colocados, confirmando para abrir modal
     'measure'     midiendo pares de puntos
   ============================================================ */
const state = {
  phase: 'init',
  photo: null,
  calibPoints: [],          // [{x,y}, {x,y}]
  mmPerPixel: null,
  measurements: [],         // [{id, name, a, b, mm, hidden}]
  pendingPoint: null,
  measureCounter: 0,        // contador para nombres por defecto
  renamingId: null          // id de la medida que se está renombrando
};

/* DOM refs */
const welcome = document.getElementById('welcome');
const canvas  = document.getElementById('canvas');
const ctx     = canvas.getContext('2d');
const hint    = document.getElementById('hint');
const controls= document.getElementById('controls');
const badge   = document.getElementById('scale-badge');
const fileInput = document.getElementById('file-input');

const btnPickPhoto   = document.getElementById('btn-pick-photo');
const btnRetake      = document.getElementById('btn-retake');
const btnRedoPoint   = document.getElementById('btn-redo-point');
const btnNextPoint   = document.getElementById('btn-next-point');
const btnConfirmCal  = document.getElementById('btn-confirm-cal');
const btnList        = document.getElementById('btn-list');
const btnClean       = document.getElementById('btn-clean');
const btnSave        = document.getElementById('btn-save');
const btnShare       = document.getElementById('btn-share');
const fabExitClean   = document.getElementById('fab-exit-clean');

const modalCalib   = document.getElementById('modal-calib');
const modalRename  = document.getElementById('modal-rename');
const mmInput      = document.getElementById('mm-input');
const renameInput  = document.getElementById('rename-input');

const panel         = document.getElementById('panel');
const panelBackdrop = document.getElementById('panel-backdrop');
const panelList     = document.getElementById('panel-list');
const panelEmpty    = document.getElementById('panel-empty');
const panelClose    = document.getElementById('panel-close');


/* ============================================================
   CÁMARA NATIVA
   ============================================================
   Estrategia nueva: en vez de manejar yo el stream con
   getUserMedia, abro el input file y dejo que el móvil use su
   app de cámara. El usuario hace la foto allí (con todo el
   procesamiento de imagen del fabricante) y me la entrega.
   ============================================================ */
btnPickPhoto.addEventListener('click', () => fileInput.click());
btnRetake.addEventListener('click', () => fileInput.click());

fileInput.addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  loadPhotoFromFile(file);
  /* Importante: reset del value. Si no, seleccionar la MISMA
     foto otra vez no dispara el evento change. */
  fileInput.value = '';
});

function loadPhotoFromFile(file) {
  const reader = new FileReader();
  reader.onload = (e) => {
    const img = new Image();
    img.onload = () => {
      state.photo = img;
      /* Ajusto el canvas a las dimensiones reales de la foto */
      canvas.width  = img.naturalWidth;
      canvas.height = img.naturalHeight;
      /* Reseteo estado de medidas: foto nueva = empezar de cero */
      state.calibPoints = [];
      state.measurements = [];
      state.mmPerPixel = null;
      state.pendingPoint = null;
      state.measureCounter = 0;
      setPhase('calib-1');
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}


/* ============================================================
   COORDENADAS
   ============================================================ */
function getCanvasPoint(evt) {
  const t = evt.touches ? evt.touches[0] : evt;
  const rect = canvas.getBoundingClientRect();
  const cssX = t.clientX - rect.left;
  const cssY = t.clientY - rect.top;
  return {
    x: cssX * (canvas.width  / rect.width),
    y: cssY * (canvas.height / rect.height)
  };
}


/* ============================================================
   DIBUJO
   ============================================================ */
function redraw() {
  if (!state.photo) return;

  ctx.drawImage(state.photo, 0, 0, canvas.width, canvas.height);

  /* Calibración */
  state.calibPoints.forEach(p => drawCross(p.x, p.y, '#ffeb3b'));
  if (state.calibPoints.length === 2) {
    const [a, b] = state.calibPoints;
    drawLine(a, b, '#ffeb3b', 3);
    if (state.mmPerPixel) {
      const mm = Math.hypot(b.x - a.x, b.y - a.y) * state.mmPerPixel;
      drawLabel(a, b, `ref: ${mm.toFixed(1)} mm`, '#ffeb3b');
    }
  }

  /* Mediciones visibles */
  state.measurements.forEach(m => {
    if (m.hidden) return;
    drawCross(m.a.x, m.a.y, '#e53935');
    drawCross(m.b.x, m.b.y, '#e53935');
    drawLine(m.a, m.b, '#e53935', 3);
    drawLabel(m.a, m.b, `${m.name}: ${m.mm.toFixed(1)} mm`, '#e53935');
  });

  /* Punto pendiente */
  if (state.pendingPoint) {
    drawCross(state.pendingPoint.x, state.pendingPoint.y, '#e53935');
  }
}

function drawCross(x, y, color) {
  const s = 16;
  ctx.strokeStyle = color;
  ctx.lineWidth = 4;
  ctx.beginPath();
  ctx.moveTo(x - s, y); ctx.lineTo(x + s, y);
  ctx.moveTo(x, y - s); ctx.lineTo(x, y + s);
  ctx.stroke();
}

function drawLine(a, b, color, width) {
  ctx.strokeStyle = color;
  ctx.lineWidth = width;
  ctx.beginPath();
  ctx.moveTo(a.x, a.y);
  ctx.lineTo(b.x, b.y);
  ctx.stroke();
}

function drawLabel(a, b, text, color) {
  const midX = (a.x + b.x) / 2;
  const midY = (a.y + b.y) / 2;
  const fontSize = Math.max(22, canvas.width / 50);
  ctx.font = `bold ${fontSize}px sans-serif`;

  const metrics = ctx.measureText(text);
  const padX = 10, padY = 6;
  const w = metrics.width + padX * 2;
  const h = fontSize + padY * 2;

  ctx.fillStyle = 'rgba(0,0,0,0.75)';
  ctx.fillRect(midX - w / 2, midY - h / 2, w, h);

  ctx.strokeStyle = color;
  ctx.lineWidth = 2;
  ctx.strokeRect(midX - w / 2, midY - h / 2, w, h);

  ctx.fillStyle = color;
  ctx.textBaseline = 'middle';
  ctx.textAlign = 'center';
  ctx.fillText(text, midX, midY);

  ctx.textAlign = 'left';
  ctx.textBaseline = 'alphabetic';
}


/* ============================================================
   CALIBRACIÓN PASO A PASO
   ============================================================
   Nuevo flujo confirmación por punto:
     calib-1     → toca punto 1 → calib-1-ok
     calib-1-ok  → "Siguiente" → calib-2  (o "Rehacer" → calib-1)
     calib-2     → toca punto 2 → calib-2-ok
     calib-2-ok  → "Confirmar" abre modal mm  (o "Rehacer" → calib-2)
   ============================================================ */
function onCalibTap(evt) {
  evt.preventDefault();
  const p = getCanvasPoint(evt);

  if (state.phase === 'calib-1') {
    state.calibPoints = [p];
    setPhase('calib-1-ok');
  } else if (state.phase === 'calib-2') {
    state.calibPoints[1] = p;
    setPhase('calib-2-ok');
  }
}

function openCalibModal() {
  modalCalib.classList.add('show');
  mmInput.value = '';
  setTimeout(() => mmInput.focus(), 100);
}

function confirmCalibration() {
  const mm = parseFloat(mmInput.value);
  if (!mm || mm <= 0) {
    alert('Introduce un número válido en mm');
    return;
  }
  const [a, b] = state.calibPoints;
  const pixels = Math.hypot(b.x - a.x, b.y - a.y);
  state.mmPerPixel = mm / pixels;
  modalCalib.classList.remove('show');
  setPhase('measure');
}


/* ============================================================
   MEDICIÓN
   ============================================================ */
function onMeasureTap(evt) {
  evt.preventDefault();
  const p = getCanvasPoint(evt);

  if (!state.pendingPoint) {
    state.pendingPoint = p;
  } else {
    const a = state.pendingPoint;
    const b = p;
    const pixels = Math.hypot(b.x - a.x, b.y - a.y);
    const mm = pixels * state.mmPerPixel;
    state.measureCounter++;
    state.measurements.push({
      id: Date.now() + Math.random(),
      name: `Medida ${state.measureCounter}`,
      a, b, mm,
      hidden: false
    });
    state.pendingPoint = null;
    renderPanelList();
  }
  redraw();
  updateMeasureHint();
}

function updateMeasureHint() {
  if (state.pendingPoint) {
    hint.textContent = 'Toca el segundo punto para cerrar la medida';
  } else {
    const visible = state.measurements.filter(m => !m.hidden).length;
    const total   = state.measurements.length;
    if (total === 0) {
      hint.textContent = 'Toca dos puntos para medir su distancia';
    } else if (visible === total) {
      hint.textContent = `${total} medida${total > 1 ? 's' : ''}. Toca para añadir otra`;
    } else {
      hint.textContent = `${visible}/${total} visibles. Toca para añadir otra`;
    }
  }
}


/* ============================================================
   PANEL LATERAL DE MEDIDAS
   ============================================================ */
function openPanel() {
  renderPanelList();
  panel.classList.add('show');
  panelBackdrop.classList.add('show');
}
function closePanel() {
  panel.classList.remove('show');
  panelBackdrop.classList.remove('show');
}

function renderPanelList() {
  /* Limpio la lista, conservando el placeholder de vacío */
  panelList.innerHTML = '';

  if (state.measurements.length === 0) {
    const empty = document.createElement('div');
    empty.id = 'panel-empty';
    empty.textContent = 'No hay medidas todavía';
    panelList.appendChild(empty);
    return;
  }

  state.measurements.forEach(m => {
    const item = document.createElement('div');
    item.className = 'item' + (m.hidden ? ' hidden' : '');
    item.innerHTML = `
      <div class="row">
        <span class="name">${escapeHtml(m.name)}</span>
        <span class="mm">${m.mm.toFixed(1)} mm</span>
      </div>
      <div class="actions">
        <button data-act="rename" data-id="${m.id}">✏️ Renombrar</button>
        <button data-act="toggle" data-id="${m.id}">${m.hidden ? '👁 Mostrar' : '🚫 Ocultar'}</button>
        <button data-act="delete" data-id="${m.id}" class="danger">🗑</button>
      </div>
    `;
    panelList.appendChild(item);
  });
}

/* Evito problemas con nombres que contengan caracteres HTML */
function escapeHtml(s) {
  return s.replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[c]));
}

/* Delegación de eventos: un solo listener en el contenedor
   gestiona todos los botones de los items. Más eficiente y
   funciona con elementos que se añaden/quitan dinámicamente. */
panelList.addEventListener('click', (e) => {
  const btn = e.target.closest('button[data-act]');
  if (!btn) return;
  const id  = parseFloat(btn.dataset.id);
  const act = btn.dataset.act;
  const m   = state.measurements.find(x => x.id === id);
  if (!m) return;

  if (act === 'toggle') {
    m.hidden = !m.hidden;
    renderPanelList();
    redraw();
    updateMeasureHint();
  }
  else if (act === 'delete') {
    if (confirm(`¿Borrar "${m.name}"?`)) {
      state.measurements = state.measurements.filter(x => x.id !== id);
      renderPanelList();
      redraw();
      updateMeasureHint();
    }
  }
  else if (act === 'rename') {
    state.renamingId = id;
    renameInput.value = m.name;
    modalRename.classList.add('show');
    setTimeout(() => { renameInput.focus(); renameInput.select(); }, 100);
  }
});

panelClose.addEventListener('click', closePanel);
panelBackdrop.addEventListener('click', closePanel);


/* ============================================================
   MODO LIMPIO
   ============================================================ */
btnClean.addEventListener('click', () => document.body.classList.add('clean'));
fabExitClean.addEventListener('click', () => document.body.classList.remove('clean'));


/* ============================================================
   GUARDAR / COMPARTIR
   ============================================================
   Ambos exportan el mismo canvas (foto + medidas dibujadas).
   La diferencia es solo el destino.
   ============================================================ */
btnSave.addEventListener('click', () => {
  /* Aseguro estado visual actualizado antes de exportar */
  redraw();
  const link = document.createElement('a');
  link.download = `medidas-${Date.now()}.jpg`;
  link.href = canvas.toDataURL('image/jpeg', 0.92);
  link.click();
});

btnShare.addEventListener('click', () => {
  redraw();
  canvas.toBlob(async (blob) => {
    const filename = `medidas-${Date.now()}.jpg`;
    const file = new File([blob], filename, { type: 'image/jpeg' });

    if (navigator.canShare && navigator.canShare({ files: [file] })) {
      try {
        await navigator.share({
          files: [file],
          title: 'Medidas',
          text: 'Documentación de daño'
        });
      } catch (err) { /* cancelado, sin aviso */ }
    } else {
      /* Fallback a descarga si el navegador no soporta compartir archivos */
      const link = document.createElement('a');
      link.download = filename;
      link.href = URL.createObjectURL(blob);
      link.click();
      URL.revokeObjectURL(link.href);
    }
  }, 'image/jpeg', 0.92);
});


/* ============================================================
   MÁQUINA DE FASES
   ============================================================ */
function setPhase(newPhase) {
  state.phase = newPhase;

  /* Reset de listeners */
  canvas.removeEventListener('touchstart', onCalibTap);
  canvas.removeEventListener('mousedown',  onCalibTap);
  canvas.removeEventListener('touchstart', onMeasureTap);
  canvas.removeEventListener('mousedown',  onMeasureTap);

  /* Oculto todos los botones contextuales */
  [btnRetake, btnRedoPoint, btnNextPoint, btnConfirmCal,
   btnList, btnClean, btnSave, btnShare].forEach(b => b.style.display = 'none');

  /* Pantalla de bienvenida solo en init */
  welcome.style.display = (newPhase === 'init') ? 'block' : 'none';
  canvas.style.display  = (newPhase === 'init') ? 'none' : 'block';
  hint.style.display    = (newPhase === 'init') ? 'none' : 'block';
  controls.style.display= (newPhase === 'init') ? 'none' : 'flex';

  /* Badge de escala */
  if (state.mmPerPixel) {
    badge.style.display = 'block';
    badge.textContent = `escala: ${state.mmPerPixel.toFixed(3)} mm/px`;
  } else {
    badge.style.display = 'none';
  }

  if (newPhase === 'init') {
    /* nada que hacer, welcome ya visible */
  }

  else if (newPhase === 'calib-1') {
    hint.textContent = 'Toca el primer punto del flexómetro';
    btnRetake.style.display = 'block';
    canvas.addEventListener('touchstart', onCalibTap, { passive: false });
    canvas.addEventListener('mousedown',  onCalibTap);
    redraw();
  }

  else if (newPhase === 'calib-1-ok') {
    hint.textContent = '¿El primer punto está bien colocado?';
    btnRetake.style.display = 'block';
    btnRedoPoint.style.display = 'block';
    btnNextPoint.style.display = 'block';
    redraw();
  }

  else if (newPhase === 'calib-2') {
    hint.textContent = 'Toca el segundo punto del flexómetro';
    btnRetake.style.display = 'block';
    canvas.addEventListener('touchstart', onCalibTap, { passive: false });
    canvas.addEventListener('mousedown',  onCalibTap);
    redraw();
  }

  else if (newPhase === 'calib-2-ok') {
    hint.textContent = '¿Los dos puntos están bien colocados?';
    btnRetake.style.display = 'block';
    btnRedoPoint.style.display = 'block';
    btnConfirmCal.style.display = 'block';
    redraw();
  }

  else if (newPhase === 'measure') {
    btnRetake.style.display = 'block';
    btnList.style.display = 'block';
    btnClean.style.display = 'block';
    btnSave.style.display = 'block';
    btnShare.style.display = 'block';
    canvas.addEventListener('touchstart', onMeasureTap, { passive: false });
    canvas.addEventListener('mousedown',  onMeasureTap);
    updateMeasureHint();
    redraw();
  }
}


/* ============================================================
   BOTONES DE CALIBRACIÓN
   ============================================================ */
btnRedoPoint.addEventListener('click', () => {
  /* Rehacer el último punto colocado */
  if (state.phase === 'calib-1-ok') {
    state.calibPoints = [];
    setPhase('calib-1');
  } else if (state.phase === 'calib-2-ok') {
    state.calibPoints.pop();
    setPhase('calib-2');
  }
});

btnNextPoint.addEventListener('click', () => setPhase('calib-2'));
btnConfirmCal.addEventListener('click', openCalibModal);

document.getElementById('calib-ok').addEventListener('click', confirmCalibration);
document.getElementById('calib-cancel').addEventListener('click', () => {
  modalCalib.classList.remove('show');
  setPhase('calib-2-ok');
});


/* ============================================================
   RENOMBRAR
   ============================================================ */
document.getElementById('rename-ok').addEventListener('click', () => {
  const newName = renameInput.value.trim();
  if (!newName) {
    alert('El nombre no puede estar vacío');
    return;
  }
  const m = state.measurements.find(x => x.id === state.renamingId);
  if (m) m.name = newName;
  modalRename.classList.remove('show');
  state.renamingId = null;
  renderPanelList();
  redraw();
});
document.getElementById('rename-cancel').addEventListener('click', () => {
  modalRename.classList.remove('show');
  state.renamingId = null;
});

/* Pulsar Enter en el input también acepta */
renameInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') document.getElementById('rename-ok').click();
});
mmInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') document.getElementById('calib-ok').click();
});


/* ============================================================
   LISTA
   ============================================================ */
btnList.addEventListener('click', openPanel);


/* ============================================================
   ARRANQUE
   ============================================================ */
setPhase('init');
</script>
</body>
</html>
